<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f4f7;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }
    .container { width: 100%; max-width: 600px; }
    h1 { margin-bottom: 20px; color: #222; }
    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #0078d4; }
    button {
      margin-top: 12px;
      padding: 10px 28px;
      font-size: 15px;
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #666;
      min-height: 20px;
    }
    .result-box {
      margin-top: 20px;
      padding: 16px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      white-space: pre-wrap;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 14px;
      color: #333;
      min-height: 60px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Agent</h1>
    <label for="workspace" style="display:block; margin-bottom:6px; color:#333; font-size:14px;">Workspace path</label>
    <input id="workspace" type="text" placeholder="C:\\path\\to\\repo" style="width:100%; padding:10px 12px; font-size:14px; border:1px solid #ccc; border-radius:6px; margin-bottom:12px;" />
    <textarea id="prompt" placeholder="Type an instruction..."></textarea>
    <button id="sendBtn" onclick="send()">&#9658; Send</button>
    <div class="status" id="status"></div>
    <div class="result-box" id="result"></div>
  </div>
  <script>
    async function loadConfig() {
      try {
        const res = await fetch("/config");
        const data = await res.json();
        if (data.defaultWorkspace) {
          document.getElementById("workspace").value = data.defaultWorkspace;
        }
      } catch {
        // Keep manual input if config fetch fails
      }
    }

    async function send() {
      const prompt = document.getElementById("prompt").value.trim();
      const workspacePath = document.getElementById("workspace").value.trim();
      if (!prompt) return;

      const btn = document.getElementById("sendBtn");
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      btn.disabled = true;
      status.textContent = "Waiting for Copilot..." + (workspacePath ? ` (workspace: ${workspacePath})` : "");
      result.style.display = "none";
      result.textContent = "";

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, workspacePath }),
        });
        const data = await res.json();
        result.textContent = data.result;
        result.style.display = "block";
        status.textContent = "";
      } catch (err) {
        result.textContent = "Request failed: " + err.message;
        result.style.display = "block";
        status.textContent = "";
      } finally {
        btn.disabled = false;
      }
    }

    loadConfig();
  </script>
</body>
</html>
